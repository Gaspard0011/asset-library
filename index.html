<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 图片上传系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* 自定义动画 */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        .animate-delay-1 { animation-delay: 0.1s; }
        .animate-delay-2 { animation-delay: 0.2s; }
        .animate-delay-3 { animation-delay: 0.3s; }
        
        .drop-zone {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='16' ry='16' stroke='%23CBD5E1FF' stroke-width='2' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            transition: all 0.3s ease;
        }
        
        .drop-zone.drag-over {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='16' ry='16' stroke='%233B82F6FF' stroke-width='3' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            background-color: #EFF6FF;
            transform: scale(1.02);
        }
        
        .image-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .loading-ring::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.3);
            transform: translate(-50%, -50%);
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        .progress-bar {
            transition: width 0.3s ease;
        }
        
        /* 骨架屏加载动画 */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .toast {
            animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- 顶部导航 -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 backdrop-blur-md bg-white/80">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900 tracking-tight">Supabase 图库</h1>
                        <p class="text-xs text-gray-500">Storage 存储 · 极速上传</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-green-50 border border-green-200 rounded-full">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-sm font-medium text-green-700" id="storageStatus">Storage 已连接</span>
                    </div>
                    <button onclick="toggleConfig()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 配置面板 -->
    <div id="configPanel" class="hidden bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="bg-gray-50 rounded-2xl p-6 border border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                    </svg>
                    Supabase 配置
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Project URL</label>
                        <input type="text" id="supabaseUrl" placeholder="https://your-project.supabase.co" 
                            class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Anon Key</label>
                        <input type="password" id="supabaseKey" placeholder="your-anon-key" 
                            class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                    </div>
                </div>
                <div class="mt-4 flex justify-end">
                    <button onclick="saveConfig()" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-all shadow-lg shadow-blue-600/20">
                        保存并连接
                    </button>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- 上传区域 -->
        <div class="mb-10 animate-slide-up">
            <div id="dropZone" class="drop-zone relative bg-white rounded-2xl p-8 sm:p-12 text-center cursor-pointer group">
                <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
                
                <div class="relative inline-flex items-center justify-center w-20 h-20 mb-6 rounded-full bg-blue-50 group-hover:bg-blue-100 transition-colors">
                    <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <div class="absolute inset-0 rounded-full border-2 border-blue-200 border-dashed animate-spin-slow opacity-0 group-hover:opacity-100"></div>
                </div>
                
                <h3 class="text-xl font-semibold text-gray-900 mb-2">拖拽图片到这里上传</h3>
                <p class="text-gray-500 mb-4">或者 <span class="text-blue-600 font-medium">点击选择文件</span></p>
                <p class="text-sm text-gray-400">支持 JPG、PNG、GIF、WebP · 单文件最大 50MB</p>
                
                <!-- 上传进度条（隐藏状态） -->
                <div id="uploadProgress" class="hidden mt-6 max-w-md mx-auto">
                    <div class="flex justify-between text-sm font-medium text-gray-700 mb-2">
                        <span id="uploadFileName">正在上传...</span>
                        <span id="uploadPercent">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                        <div id="progressBar" class="progress-bar bg-gradient-to-r from-blue-500 to-indigo-600 h-2.5 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="flex flex-wrap items-center justify-between mb-6 animate-slide-up animate-delay-1">
            <div class="flex items-center gap-6 mb-4 sm:mb-0">
                <div>
                    <p class="text-sm text-gray-500 mb-0.5">总图片数</p>
                    <p class="text-2xl font-bold text-gray-900" id="totalCount">0</p>
                </div>
                <div class="w-px h-10 bg-gray-200"></div>
                <div>
                    <p class="text-sm text-gray-500 mb-0.5">存储空间</p>
                    <p class="text-2xl font-bold text-gray-900" id="totalSize">0 MB</p>
                </div>
            </div>
            
            <div class="flex gap-2">
                <select id="sortSelect" onchange="loadImages()" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                    <option value="newest">最新上传</option>
                    <option value="oldest">最早上传</option>
                    <option value="name">文件名</option>
                    <option value="size">文件大小</option>
                </select>
            </div>
        </div>

        <!-- 图片网格 -->
        <div id="imageGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 animate-slide-up animate-delay-2">
            <!-- 动态生成 -->
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="hidden text-center py-20 animate-slide-up">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gray-100 mb-4">
                <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
            </div>
            <h3 class="text-lg font-medium text-gray-900 mb-1">暂无图片</h3>
            <p class="text-gray-500">上传你的第一张图片开始使用</p>
        </div>

        <!-- 加载更多 -->
        <div id="loadMore" class="hidden text-center mt-8">
            <button onclick="loadImages()" class="px-6 py-3 bg-white border border-gray-200 hover:border-gray-300 text-gray-700 font-medium rounded-xl transition-all shadow-sm">
                加载更多
            </button>
        </div>
    </main>

    <!-- Toast 通知 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <!-- 图片预览模态框 -->
    <div id="previewModal" class="fixed inset-0 z-50 hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4" onclick="closePreview()">
        <div class="relative max-w-5xl max-h-[90vh] w-full flex items-center justify-center" onclick="event.stopPropagation()">
            <img id="previewImage" src="" alt="" class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl">
            <button onclick="closePreview()" class="absolute -top-12 right-0 p-2 text-white/80 hover:text-white transition-colors">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/60 to-transparent rounded-b-lg">
                <p id="previewName" class="text-white font-medium text-lg"></p>
                <p id="previewMeta" class="text-white/70 text-sm mt-1"></p>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        let supabaseClient = null;
        const BUCKET_NAME = 'images';
        const TABLE_NAME = 'image_records';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('supabaseUrl');
            const savedKey = localStorage.getItem('supabaseKey');
            
            if (savedUrl && savedKey) {
                document.getElementById('supabaseUrl').value = savedUrl;
                document.getElementById('supabaseKey').value = savedKey;
                initSupabase(savedUrl, savedKey);
            } else {
                toggleConfig();
            }
            
            setupDragAndDrop();
        });

        function toggleConfig() {
            const panel = document.getElementById('configPanel');
            panel.classList.toggle('hidden');
        }

        function saveConfig() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            
            if (!url || !key) {
                showToast('请填写完整的配置信息', 'error');
                return;
            }
            
            localStorage.setItem('supabaseUrl', url);
            localStorage.setItem('supabaseKey', key);
            initSupabase(url, key);
            toggleConfig();
        }

        function initSupabase(url, key) {
            try {
                supabaseClient = supabase.createClient(url, key);
                document.getElementById('storageStatus').textContent = 'Storage 已连接';
                document.getElementById('storageStatus').parentElement.className = 'hidden sm:flex items-center gap-2 px-3 py-1.5 bg-green-50 border border-green-200 rounded-full';
                document.querySelector('#storageStatus').previousElementSibling.className = 'w-2 h-2 bg-green-500 rounded-full animate-pulse';
                
                ensureBucket().then(() => {
                    loadImages();
                });
                
                showToast('Supabase 连接成功', 'success');
            } catch (e) {
                showToast('连接失败，请检查配置', 'error');
                console.error(e);
            }
        }

        async function ensureBucket() {
            try {
                const { data: buckets } = await supabaseClient.storage.listBuckets();
                const exists = buckets.find(b => b.name === BUCKET_NAME);
                
                if (!exists) {
                    await supabaseClient.storage.createBucket(BUCKET_NAME, {
                        public: true,
                        fileSizeLimit: 52428800 // 50MB
                    });
                }
            } catch (e) {
                console.log('Bucket 检查/创建:', e.message);
            }
        }

        // ==================== 拖拽上传 ====================
        function setupDragAndDrop() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            
            dropZone.addEventListener('click', () => fileInput.click());
            
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });
            
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('drag-over');
            });
            
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                handleFiles(e.dataTransfer.files);
            });
            
            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
                fileInput.value = '';
            });
        }

        async function handleFiles(files) {
            if (!supabaseClient) {
                showToast('请先配置 Supabase', 'error');
                return;
            }
            
            const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            
            if (imageFiles.length === 0) {
                showToast('请选择图片文件', 'error');
                return;
            }
            
            for (const file of imageFiles) {
                await uploadFile(file);
            }
            
            loadImages();
        }

        // ==================== 核心上传逻辑 ====================
        async function uploadFile(file) {
            const progressEl = document.getElementById('uploadProgress');
            const fileNameEl = document.getElementById('uploadFileName');
            const percentEl = document.getElementById('uploadPercent');
            const barEl = document.getElementById('progressBar');
            
            progressEl.classList.remove('hidden');
            fileNameEl.textContent = file.name;
            
            try {
                // 生成唯一文件名
                const ext = file.name.split('.').pop();
                const uniqueName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${ext}`;
                const filePath = `${new Date().getFullYear()}/${(new Date().getMonth()+1).toString().padStart(2,'0')}/${uniqueName}`;
                
                // 上传到 Supabase Storage
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from(BUCKET_NAME)
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false,
                        onUploadProgress: (progress) => {
                            const percent = Math.round((progress.loaded / progress.total) * 100);
                            percentEl.textContent = `${percent}%`;
                            barEl.style.width = `${percent}%`;
                        }
                    });
                
                if (uploadError) throw uploadError;
                
                // 获取公开 URL
                const { data: urlData } = supabaseClient.storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(filePath);
                
                // 保存记录到数据库（只存链接，不存 Base64）
                const { error: dbError } = await supabaseClient
                    .from(TABLE_NAME)
                    .insert({
                        name: file.name,
                        storage_path: filePath,
                        public_url: urlData.publicUrl,
                        size: file.size,
                        type: file.type,
                        created_at: new Date().toISOString()
                    });
                
                if (dbError) throw dbError;
                
                showToast(`"${file.name}" 上传成功`, 'success');
                
            } catch (error) {
                showToast(`上传失败: ${error.message}`, 'error');
                console.error(error);
            } finally {
                setTimeout(() => {
                    progressEl.classList.add('hidden');
                    barEl.style.width = '0%';
                }, 1000);
            }
        }

        // ==================== 加载图片 ====================
        async function loadImages() {
            if (!supabaseClient) return;
            
            const grid = document.getElementById('imageGrid');
            const emptyState = document.getElementById('emptyState');
            const sort = document.getElementById('sortSelect').value;
            
            try {
                // 从数据库获取记录（轻量，只存链接）
                let query = supabaseClient.from(TABLE_NAME).select('*');
                
                switch(sort) {
                    case 'newest': query = query.order('created_at', { ascending: false }); break;
                    case 'oldest': query = query.order('created_at', { ascending: true }); break;
                    case 'name': query = query.order('name', { ascending: true }); break;
                    case 'size': query = query.order('size', { ascending: false }); break;
                }
                
                const { data: records, error } = await query.limit(50);
                
                if (error) throw error;
                
                if (!records || records.length === 0) {
                    grid.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    updateStats(0, 0);
                    return;
                }
                
                emptyState.classList.add('hidden');
                
                // 计算总大小
                const totalSize = records.reduce((sum, r) => sum + (r.size || 0), 0);
                updateStats(records.length, totalSize);
                
                // 渲染图片卡片
                grid.innerHTML = records.map((record, index) => `
                    <div class="image-card group bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl animate-slide-up" style="animation-delay: ${index * 0.05}s">
                        <div class="relative aspect-[4/3] overflow-hidden bg-gray-100 cursor-pointer" onclick="previewImage('${record.public_url}', '${record.name}', '${formatSize(record.size)}')">
                            <!-- 骨架屏 -->
                            <div class="absolute inset-0 skeleton z-10 transition-opacity duration-500" id="skeleton-${record.id}"></div>
                            
                            <img src="${record.public_url}" 
                                 alt="${record.name}"
                                 class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                 onload="document.getElementById('skeleton-${record.id}').style.opacity = '0'"
                                 loading="lazy">
                            
                            <!-- 悬浮遮罩 -->
                            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-all duration-300 flex items-center justify-center opacity-0 group-hover:opacity-100">
                                <div class="bg-white/90 backdrop-blur-sm rounded-full p-3 transform scale-75 group-hover:scale-100 transition-transform">
                                    <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        
                        <div class="p-4">
                            <div class="flex items-start justify-between gap-2">
                                <div class="min-w-0 flex-1">
                                    <h4 class="font-medium text-gray-900 truncate text-sm" title="${record.name}">${record.name}</h4>
                                    <p class="text-xs text-gray-500 mt-1">${formatSize(record.size)} · ${formatDate(record.created_at)}</p>
                                </div>
                                <button onclick="deleteImage('${record.id}', '${record.storage_path}')" 
                                    class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all opacity-0 group-hover:opacity-100">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                            </div>
                            
                            <div class="mt-3 flex items-center gap-2">
                                <button onclick="copyUrl('${record.public_url}')" 
                                    class="flex-1 px-3 py-1.5 bg-gray-50 hover:bg-gray-100 text-gray-600 text-xs font-medium rounded-lg transition-colors flex items-center justify-center gap-1.5">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                    </svg>
                                    复制链接
                                </button>
                                <a href="${record.public_url}" target="_blank"
                                    class="flex-1 px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-600 text-xs font-medium rounded-lg transition-colors flex items-center justify-center gap-1.5">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                                    </svg>
                                    打开
                                </a>
                            </div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                showToast('加载失败: ' + error.message, 'error');
                console.error(error);
            }
        }

        // ==================== 删除 ====================
        async function deleteImage(id, storagePath) {
            if (!confirm('确定要删除这张图片吗？')) return;
            
            try {
                // 删除 Storage 文件
                const { error: storageError } = await supabaseClient.storage
                    .from(BUCKET_NAME)
                    .remove([storagePath]);
                
                if (storageError) throw storageError;
                
                // 删除数据库记录
                const { error: dbError } = await supabaseClient
                    .from(TABLE_NAME)
                    .delete()
                    .eq('id', id);
                
                if (dbError) throw dbError;
                
                showToast('删除成功', 'success');
                loadImages();
                
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        // ==================== 预览 ====================
        function previewImage(url, name, size) {
            document.getElementById('previewImage').src = url;
            document.getElementById('previewName').textContent = name;
            document.getElementById('previewMeta').textContent = size;
            document.getElementById('previewModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closePreview() {
            document.getElementById('previewModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        // ==================== 工具函数 ====================
        function copyUrl(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast('链接已复制到剪贴板', 'success');
            });
        }

        function formatSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function formatDate(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
        }

        function updateStats(count, size) {
            document.getElementById('totalCount').textContent = count;
            document.getElementById('totalSize').textContent = formatSize(size);
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };
            
            const icons = {
                success: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>',
                error: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>',
                info: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'
            };
            
            toast.className = `toast flex items-center gap-3 px-5 py-3.5 ${colors[type]} text-white rounded-xl shadow-lg shadow-${type === 'success' ? 'green' : type === 'error' ? 'red' : 'blue'}-500/30 min-w-[300px]`;
            toast.innerHTML = `
                ${icons[type]}
                <span class="font-medium text-sm">${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ESC 关闭预览
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePreview();
        });
    </script>
</body>
</html>
